{% extends 'global/base.html' %}

{% block content %}
<div class="form-wrapper">
    <h2>Criar Contato</h2>

    <!-- enctype serve para indicar que o formulário pode enviar arquivos, como imagens ou documentos. -->
    <form action="{% url 'contact:create' %}" method="POST" enctype="multipart/form-data">
        <!-- proteção contra ataques CSRF (Cross-Site Request Forgery) -->
        {% csrf_token %}
        <!-- cria os campos do formulário dinamicamente -->
        <div class="form-content">
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}:</label>
                {{ field }}
                {% if field.help_text %}
                    <small class="form-text text-muted">{{ field.help_text }}</small>
                {% endif %}
                {% for error in field.errors %}
                 <div class="message error">{{ error }}</div>
                {% endfor %}
            </div>
            {% endfor %}
        </div>
        <div class="form-content">
            <div class="form-group">
                <button class="btn" type="submit">Salvar</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
